<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Project: Linked List Ecosystem</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { color: #4CAF50; margin: 0; font-size: 1.5rem; }

        .ui-panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* --- CODE VIEW STYLING --- */
        #code-view {
            width: 450px; 
            height: 450px; 
            background-color: #1e1e1e;
            color: #9cdcfe;
            border: 2px solid #444;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            margin: 0;
        }

        /* --- CANVAS STYLING --- */
        #canvas-container { 
            position: relative; 
            display: none; /* Hidden on load */
        }

        canvas { 
            background-color: #000; 
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
        }

        #btnStart { background: #4CAF50; color: white; }
        #btnStop { background: #f44336; color: white; }
        #btnReset { background: #2196F3; color: white; }
        
        .status { font-weight: bold; color: #ffeb3b; min-width: 150px; text-align: center; }

        .legend { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
        .legend span { margin: 0 10px; }
        .c-p { color: #f44336; font-weight: bold; }
        .c-c { color: #4CAF50; font-weight: bold; }
        .c-b { color: #FFEB3B; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DSA Linked List Ecosystem</h1>
    </div>

    <div class="ui-panel">
        <button id="btnStart">Start</button>
        <button id="btnStop">Stop</button>
        <button id="btnReset">Reset</button>
        <div class="status" id="statusText">Ready</div>
    </div>

    <pre id="code-view"></pre>

    <div id="canvas-container">
        <canvas id="gridCanvas"></canvas>
    </div>

    <div class="legend">
        <span><span class="c-p">P</span> = Predator</span>
        <span><span class="c-c">C</span> = Collector</span>
        <span><span class="c-b">B</span> = Builder</span>
    </div>

<script type="text/plain" id="c-source">
#include <stdio.h>
#include <stdlib.h>
#include <time.h>
#include <unistd.h> // for sleep()

#define N 10

struct node {
    int x, y;
    char type;
    int hunger;
    struct node* next;
};

struct node* head = NULL;

int dx[4] = {-1, 1, 0, 0};
int dy[4] = {0, 0, -1, 1};

void add(int x, int y, char type)
{
    struct node* temp = (struct node*)malloc(sizeof(struct node));
    temp->x = x;
    temp->y = y;
    temp->type = type;
    temp->hunger = 0;
    temp->next = head;
    head = temp;
}

void remove_node(struct node* prev, struct node* curr)
{
    if(prev == NULL)
        head = curr->next;
    else
        prev->next = curr->next;

    free(curr);
}

int valid(int x, int y)
{
    return x>=0 && x<N && y>=0 && y<N;
}

struct node* find_at(int x, int y)
{
    struct node* temp = head;
    while(temp)
    {
        if(temp->x==x && temp->y==y)
            return temp;
        temp = temp->next;
    }
    return NULL;
}

void print_grid()
{
    char grid[N][N];
    int i,j;

    for(i=0;i<N;i++)
        for(j=0;j<N;j++)
            grid[i][j]='.';

    struct node* temp = head;
    while(temp)
    {
        grid[temp->x][temp->y] = temp->type;
        temp = temp->next;
    }

    for(i=0;i<N;i++)
    {
        for(j=0;j<N;j++)
            printf("%c ",grid[i][j]);
        printf("\n");
    }
    printf("\n");
}

void simulate()
{
    while(1)
    {
        struct node* curr = head;
        struct node* prev = NULL;

        while(curr)
        {
            int dir = rand()%4;
            int nx = curr->x + dx[dir];
            int ny = curr->y + dy[dir];

            struct node* other = NULL;
            if(valid(nx,ny))
                other = find_at(nx,ny);

            if(curr->type=='P')
            {
                int foodx[4], foody[4];
                int count = 0;

                for(int i=0;i<4;i++)
                {
                    int tx = curr->x + dx[i];
                    int ty = curr->y + dy[i];

                    if(valid(tx,ty))
                    {
                        struct node* t = find_at(tx,ty);
                        if(t && (t->type=='C' || t->type=='B'))
                        {
                            foodx[count] = tx;
                            foody[count] = ty;
                            count++;
                        }
                    }
                }

                if(count > 0)
                {
                    int choice = rand()%count;
                    int ex = foodx[choice];
                    int ey = foody[choice];

                    struct node* t = head;
                    struct node* p = NULL;

                    while(t && !(t->x==ex && t->y==ey))
                    {
                        p = t;
                        t = t->next;
                    }

                    if(t)
                        remove_node(p,t);

                    curr->x = ex;
                    curr->y = ey;
                    curr->hunger = 0;
                }
                else
                {
                    if(valid(nx,ny) && !other)
                    {
                        curr->x = nx;
                        curr->y = ny;
                    }
                    curr->hunger++;
                }
            }
            else
            {
                if(valid(nx,ny) && !other)
                {
                    curr->x = nx;
                    curr->y = ny;
                }
            }

            // predator dies
            if(curr->type=='P' && curr->hunger > 3)
            {
                struct node* temp = curr->next;
                remove_node(prev, curr);
                curr = temp;
                print_grid();
                usleep(200000);
                continue;
            }

            print_grid();       // 🔥 PRINT AFTER EVERY ACTION
            usleep(200000);    // small delay for animation

            prev = curr;
            curr = curr->next;
        }

        // stop conditions
        int p=0,c=0,b=0;
        struct node* t = head;
        while(t)
        {
            if(t->type=='P') p++;
            else if(t->type=='C') c++;
            else if(t->type=='B') b++;
            t = t->next;
        }

        if(p==0 || (c==0 && b==0))
        {
            printf("Simulation ended\n");
            return;
        }
    }
}

int main()
{
    srand(time(NULL));

    for(int i=0;i<3;i++)
        add(rand()%N, rand()%N, 'P');

    for(int i=0;i<8;i++)
        add(rand()%N, rand()%N, 'C');

    for(int i=0;i<6;i++)
        add(rand()%N, rand()%N, 'B');

    print_grid();
    simulate();

    return 0;
}
</script>

<script>
// Load C code into the viewer
document.getElementById('code-view').textContent = document.getElementById('c-source').textContent.trim();

// --- JS SINGLY LINKED LIST (Mirroring the C struct) ---
class Node {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; 
        this.hunger = 0;
        this.next = null;
    }
}

class LinkedList {
    constructor() { this.head = null; }
    add(x, y, type) {
        const temp = new Node(x, y, type);
        temp.next = this.head;
        this.head = temp;
    }
    removeNode(prev, curr) {
        if (prev === null) this.head = curr.next;
        else prev.next = curr.next;
    }
    findAt(x, y) {
        let temp = this.head;
        while (temp !== null) {
            if (temp.x === x && temp.y === y) return temp;
            temp = temp.next;
        }
        return null;
    }
    clear() { this.head = null; }
}

// --- SIMULATION CONFIG ---
const N = 10; 
const CELL_SIZE = 45; 
const canvas = document.getElementById('gridCanvas');
const ctx = canvas.getContext('2d');
canvas.width = N * CELL_SIZE;
canvas.height = N * CELL_SIZE;

const dx = [-1, 1, 0, 0];
const dy = [0, 0, -1, 1];

const list = new LinkedList();
let running = false;
let hasStartedOnce = false;

function valid(x, y) { return x >= 0 && x < N && y >= 0 && y < N; }
const sleep = ms => new Promise(r => setTimeout(r, ms));

function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#333";
    for (let i = 0; i <= N; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE); ctx.stroke();
    }

    let temp = list.head;
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    while (temp !== null) {
        const px = temp.y * CELL_SIZE + CELL_SIZE / 2; 
        const py = temp.x * CELL_SIZE + CELL_SIZE / 2;

        if (temp.type === 'P') ctx.fillStyle = "#f44336"; 
        else if (temp.type === 'C') ctx.fillStyle = "#4CAF50"; 
        else if (temp.type === 'B') ctx.fillStyle = "#FFEB3B"; 
        
        ctx.fillText(temp.type, px, py);
        
        if (temp.type === 'P') {
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(temp.hunger, px + 14, py - 14);
            ctx.font = "bold 24px Arial"; 
        }
        temp = temp.next;
    }
}

// --- CORE ASYNC SIMULATION LOOP ---
async function simulate() {
    while (running) {
        let curr = list.head;
        let prev = null;

        while (curr !== null && running) {
            let dir = Math.floor(Math.random() * 4);
            let nx = curr.x + dx[dir];
            let ny = curr.y + dy[dir];

            let other = null;
            if (valid(nx, ny)) other = list.findAt(nx, ny);

            if (curr.type === 'P') {
                let foodx = [], foody = [];

                for (let i = 0; i < 4; i++) {
                    let tx = curr.x + dx[i];
                    let ty = curr.y + dy[i];
                    if (valid(tx, ty)) {
                        let t = list.findAt(tx, ty);
                        if (t !== null && (t.type === 'C' || t.type === 'B')) {
                            foodx.push(tx); foody.push(ty);
                        }
                    }
                }

                if (foodx.length > 0) {
                    let choice = Math.floor(Math.random() * foodx.length);
                    let ex = foodx[choice];
                    let ey = foody[choice];

                    let t = list.head;
                    let p = null;

                    while (t !== null && !(t.x === ex && t.y === ey)) {
                        p = t; t = t.next;
                    }

                    if (t !== null) list.removeNode(p, t);

                    curr.x = ex; curr.y = ey; curr.hunger = 0;
                } else {
                    if (valid(nx, ny) && !other) { curr.x = nx; curr.y = ny; }
                    curr.hunger++;
                }
            } else {
                if (valid(nx, ny) && !other) { curr.x = nx; curr.y = ny; }
            }

            if (curr.type === 'P' && curr.hunger > 3) {
                let temp = curr.next;
                list.removeNode(prev, curr);
                curr = temp; 
                drawGrid();
                await sleep(200); 
                continue;
            }

            drawGrid(); 
            await sleep(200);

            prev = curr;
            curr = curr.next;
        }

        let p = 0, c = 0, b = 0;
        let t = list.head;
        while (t !== null) {
            if (t.type === 'P') p++;
            else if (t.type === 'C') c++;
            else if (t.type === 'B') b++;
            t = t.next;
        }

        if (p === 0 || (c === 0 && b === 0)) {
            document.getElementById('statusText').innerText = "Simulation Ended";
            document.getElementById('statusText').style.color = "#f44336";
            running = false;
            return;
        }
    }
}

// --- CONTROLS ---
function init() {
    list.clear();
    running = false;
    document.getElementById('statusText').innerText = "Ready";
    document.getElementById('statusText').style.color = "#ffeb3b";

    for (let i = 0; i < 3; i++) list.add(Math.floor(Math.random() * N), Math.floor(Math.random() * N), 'P');
    for (let i = 0; i < 8; i++) list.add(Math.floor(Math.random() * N), Math.floor(Math.random() * N), 'C');
    for (let i = 0; i < 6; i++) list.add(Math.floor(Math.random() * N), Math.floor(Math.random() * N), 'B');

    if (hasStartedOnce) drawGrid();
}

document.getElementById('btnStart').onclick = () => {
    if (!hasStartedOnce) {
        document.getElementById('code-view').style.display = 'none';
        document.getElementById('canvas-container').style.display = 'block';
        hasStartedOnce = true;
        drawGrid();
    }
    if (!running) {
        running = true;
        document.getElementById('statusText').innerText = "Running...";
        document.getElementById('statusText').style.color = "#4CAF50";
        simulate(); 
    }
};

document.getElementById('btnStop').onclick = () => {
    running = false;
    document.getElementById('statusText').innerText = "Stopped";
    document.getElementById('statusText').style.color = "#f44336";
};

document.getElementById('btnReset').onclick = init;

init();
</script>
</body>
</html>
