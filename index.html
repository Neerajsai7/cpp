<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosystem: Workers & Predators</title>
    <style>
        body {
            background-color: #121212;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .ui-panel {
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        canvas { 
            background-color: #000; 
            border: 3px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            padding: 8px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        #btnStart { background: #4CAF50; color: white; }
        #btnStop { background: #f44336; color: white; }

        .stat { font-size: 0.85rem; font-weight: bold; }
        .col-green { color: #4CAF50; }
        .col-yellow { color: #FFEB3B; }
        .col-red { color: #f44336; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <button id="btnStart">START</button>
        <button id="btnStop">STOP</button>
        <div class="stat col-green">Collectors: <span id="c-coll">0</span></div>
        <div class="stat col-yellow">Builders: <span id="c-build">0</span></div>
        <div class="stat col-red">Predators: <span id="c-pred">0</span></div>
        <div class="stat" style="color:white">Base Level: <span id="c-base">0</span></div>
    </div>

    <canvas id="ecoCanvas"></canvas>

<script>
const GRID_SIZE = 24;
const CELL_SIZE = 25;
const canvas = document.getElementById('ecoCanvas');
const ctx = canvas.getContext('2d');

canvas.width = GRID_SIZE * CELL_SIZE;
canvas.height = GRID_SIZE * CELL_SIZE;

let running = false;
const BASE_POS = { x: 12, y: 12 };

class Agent {
    constructor(x, y, energy, color) {
        this.x = x;
        this.y = y;
        this.energy = energy;
        this.maxEnergy = energy;
        this.color = color;
        this.alive = true;
    }

    moveRandom() {
        this.x = Math.max(0, Math.min(GRID_SIZE - 1, this.x + (Math.floor(Math.random() * 3) - 1)));
        this.y = Math.max(0, Math.min(GRID_SIZE - 1, this.y + (Math.floor(Math.random() * 3) - 1)));
    }
}

class Collector extends Agent {
    constructor(x, y) { super(x, y, 100, "#4CAF50"); this.hasFood = false; }
    update(env) {
        if (!this.hasFood) {
            const fIdx = env.food.findIndex(f => f.x === this.x && f.y === this.y);
            if (fIdx !== -1) { this.hasFood = true; env.food.splice(fIdx, 1); }
            this.moveRandom();
        } else {
            // Head back to base
            if (this.x < BASE_POS.x) this.x++; else if (this.x > BASE_POS.x) this.x--;
            if (this.y < BASE_POS.y) this.y++; else if (this.y > BASE_POS.y) this.y--;
            if (this.x === BASE_POS.x && this.y === BASE_POS.y) {
                this.hasFood = false;
                env.baseResources += 20;
                this.energy = this.maxEnergy;
            }
        }
        this.energy -= 0.3;
        if (this.energy <= 0) this.alive = false;
    }
}

class Builder extends Agent {
    constructor(x, y) { super(x, y, 100, "#FFEB3B"); }
    update(env) {
        // Stay near base to build
        if (Math.abs(this.x - BASE_POS.x) > 2 || Math.abs(this.y - BASE_POS.y) > 2) {
            if (this.x < BASE_POS.x) this.x++; else if (this.x > BASE_POS.x) this.x--;
            if (this.y < BASE_POS.y) this.y++; else if (this.y > BASE_POS.y) this.y--;
        } else {
            this.moveRandom();
            if (env.baseResources > 0) {
                env.baseResources -= 0.5;
                env.baseConstruction += 0.2;
            }
        }
        this.energy -= 0.2;
        if (this.energy <= 0) this.alive = false;
    }
}

class Predator extends Agent {
    constructor(x, y) { super(x, y, 80, "#f44336"); }
    update(env) {
        // Hunt any worker
        const prey = env.agents.find(a => (a instanceof Collector || a instanceof Builder) && a.x === this.x && a.y === this.y);
        if (prey) {
            prey.alive = false;
            this.energy = this.maxEnergy;
        }
        for(let i=0; i<2; i++) this.moveRandom();
        this.energy -= 1.8; // High metabolism - dies without food
        if (this.energy <= 0) this.alive = false;
    }
}

const world = {
    agents: [],
    food: [],
    baseResources: 0,
    baseConstruction: 0,

    init() {
        for(let i=0; i<10; i++) this.agents.push(new Collector(rand(GRID_SIZE), rand(GRID_SIZE)));
        for(let i=0; i<5; i++) this.agents.push(new Builder(BASE_POS.x, BASE_POS.y));
        for(let i=0; i<3; i++) this.agents.push(new Predator(rand(GRID_SIZE), rand(GRID_SIZE)));
    },

    update() {
        if (Math.random() < 0.3) this.food.push({x: rand(GRID_SIZE), y: rand(GRID_SIZE)});
        this.agents.forEach(a => a.update(this));
        this.agents = this.agents.filter(a => a.alive);
    },

    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Base
        const baseSize = 10 + Math.floor(this.baseConstruction / 10);
        ctx.fillStyle = "#555";
        ctx.fillRect(BASE_POS.x*CELL_SIZE - baseSize/2 + 12, BASE_POS.y*CELL_SIZE - baseSize/2 + 12, baseSize, baseSize);

        // Draw Food
        ctx.fillStyle = "#4CAF50";
        this.food.forEach(f => ctx.beginPath() || ctx.arc(f.x*CELL_SIZE+12, f.y*CELL_SIZE+12, 4, 0, 7) || ctx.fill());

        // Draw Agents
        this.agents.forEach(a => {
            ctx.fillStyle = a.color;
            ctx.beginPath();
            ctx.arc(a.x*CELL_SIZE+12, a.y*CELL_SIZE+12, 7, 0, 7);
            ctx.fill();
            if (a instanceof Collector && a.hasFood) {
                ctx.fillStyle = "white";
                ctx.fillRect(a.x*CELL_SIZE+10, a.y*CELL_SIZE+10, 4, 4);
            }
        });

        document.getElementById('c-coll').innerText = this.agents.filter(a => a instanceof Collector).length;
        document.getElementById('c-build').innerText = this.agents.filter(a => a instanceof Builder).length;
        document.getElementById('c-pred').innerText = this.agents.filter(a => a instanceof Predator).length;
        document.getElementById('c-base').innerText = Math.floor(this.baseConstruction);
    }
};

function rand(m) { return Math.floor(Math.random() * m); }
document.getElementById('btnStart').onclick = () => running = true;
document.getElementById('btnStop').onclick = () => running = false;

world.init();
function loop() {
    if (running) world.update();
    world.draw();
    setTimeout(loop, 120);
}
loop();
</script>
</body>
</html>
