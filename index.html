<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Ecosystem: Collectors & Builders</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { color: #4CAF50; margin: 0; font-size: 1.5rem; }

        .ui-panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #canvas-container { position: relative; }

        canvas { 
            background-color: #000; 
            border: 2px solid #444;
            image-rendering: pixelated;
        }

        /* Game Over Popup */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border: 2px solid #f44336;
        }

        #overlay h2 { color: #f44336; margin-bottom: 20px; }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
            margin: 0 5px;
        }

        #btnStart { background: #4CAF50; color: white; }
        #btnStop { background: #f44336; color: white; }
        #btnReset { background: #2196F3; color: white; }
        .btn-retry { background: #ffffff; color: #000; }

        .stat-item { font-size: 0.9rem; font-weight: bold; }
        .green { color: #4CAF50; }
        .yellow { color: #FFEB3B; }
        .red { color: #f44336; }
        .white { color: #fff; }

        .legend { margin-top: 10px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Autonomous Ecosystem</h1>
    </div>

    <div class="ui-panel">
        <div class="controls">
            <button id="btnStart">START</button>
            <button id="btnStop">STOP</button>
            <button id="btnReset">RESET</button>
        </div>
        <div class="stat-item green">Collectors: <span id="c-coll">0</span></div>
        <div class="stat-item yellow">Builders: <span id="c-build">0</span></div>
        <div class="stat-item red">Predators: <span id="c-pred">0</span></div>
        <div class="stat-item white">Base Progress: <span id="c-base">0</span></div>
    </div>

    <div id="canvas-container">
        <canvas id="ecoCanvas"></canvas>
        <div id="overlay">
            <h2>PREDATORS ARE DEAD</h2>
            <button class="btn-retry" onclick="resetSim()">RESTART SIMULATION</button>
        </div>
    </div>

    <div class="legend">
        [Green Square] = Food | [Green Dot] = Collector | [Yellow Dot] = Builder | [Red Dot] = Predator
    </div>

<script>
const GRID_SIZE = 25;
const CELL_SIZE = 25; 
const canvas = document.getElementById('ecoCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

canvas.width = GRID_SIZE * CELL_SIZE;
canvas.height = GRID_SIZE * CELL_SIZE;

let running = false;
const BASE_POS = { x: 12, y: 12 };

class Agent {
    constructor(x, y, energy, color) {
        this.x = x; this.y = y;
        this.energy = energy; this.maxEnergy = energy;
        this.color = color; this.alive = true;
    }
    moveRandom() {
        this.x = Math.max(0, Math.min(GRID_SIZE - 1, this.x + (Math.floor(Math.random() * 3) - 1)));
        this.y = Math.max(0, Math.min(GRID_SIZE - 1, this.y + (Math.floor(Math.random() * 3) - 1)));
    }
}

class Collector extends Agent {
    constructor(x, y) { super(x, y, 100, "#4CAF50"); this.hasFood = false; }
    update(env) {
        if (!this.hasFood) {
            const fIdx = env.food.findIndex(f => f.x === this.x && f.y === this.y);
            if (fIdx !== -1) { this.hasFood = true; env.food.splice(fIdx, 1); }
            this.moveRandom();
        } else {
            if (this.x < BASE_POS.x) this.x++; else if (this.x > BASE_POS.x) this.x--;
            if (this.y < BASE_POS.y) this.y++; else if (this.y > BASE_POS.y) this.y--;
            if (this.x === BASE_POS.x && this.y === BASE_POS.y) {
                this.hasFood = false;
                env.baseResources += 30;
                this.energy = this.maxEnergy;
            }
        }
        this.energy -= 0.4;
        if (this.energy <= 0) this.alive = false;
    }
}

class Builder extends Agent {
    constructor(x, y) { super(x, y, 100, "#FFEB3B"); }
    update(env) {
        const distToBase = Math.abs(this.x - BASE_POS.x) + Math.abs(this.y - BASE_POS.y);
        if (distToBase > 3) {
            if (this.x < BASE_POS.x) this.x++; else if (this.x > BASE_POS.x) this.x--;
            if (this.y < BASE_POS.y) this.y++; else if (this.y > BASE_POS.y) this.y--;
        } else {
            this.moveRandom();
            if (env.baseResources > 0) {
                env.baseResources -= 1; 
                env.baseConstruction += 0.1;
                this.energy = Math.min(this.maxEnergy, this.energy + 2);
            }
        }
        this.energy -= 0.3;
        if (this.energy <= 0) this.alive = false;
    }
}

class Predator extends Agent {
    constructor(x, y) { super(x, y, 80, "#f44336"); }
    update(env) {
        const prey = env.agents.find(a => (a instanceof Collector || a instanceof Builder) && a.x === this.x && a.y === this.y && a.alive);
        if (prey) { prey.alive = false; this.energy = this.maxEnergy; }
        for(let i=0; i<2; i++) this.moveRandom();
        this.energy -= 2.5; // High starvation rate
        if (this.energy <= 0) this.alive = false;
    }
}

const world = {
    agents: [], food: [], baseResources: 0, baseConstruction: 0,
    init() {
        this.agents = []; this.food = []; this.baseResources = 0; this.baseConstruction = 0;
        for(let i=0; i<12; i++) this.agents.push(new Collector(rand(GRID_SIZE), rand(GRID_SIZE)));
        for(let i=0; i<6; i++) this.agents.push(new Builder(BASE_POS.x, BASE_POS.y));
        for(let i=0; i<3; i++) this.agents.push(new Predator(rand(GRID_SIZE), rand(GRID_SIZE)));
        overlay.style.display = 'none';
    },
    update() {
        if (Math.random() < 0.4) this.food.push({x: rand(GRID_SIZE), y: rand(GRID_SIZE)});
        this.agents.forEach(a => { if (a.alive) a.update(this); });
        this.agents = this.agents.filter(a => a.alive);

        // Check for Predator extinction
        const predatorCount = this.agents.filter(a => a instanceof Predator).length;
        if (predatorCount === 0) {
            running = false;
            overlay.style.display = 'flex';
        }
    },
    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#1a1a1a";
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE); ctx.stroke();
        }
        const bSize = 15 + Math.floor(this.baseConstruction / 5);
        ctx.fillStyle = "#333";
        ctx.fillRect(BASE_POS.x * CELL_SIZE - bSize/4, BASE_POS.y * CELL_SIZE - bSize/4, bSize, bSize);
        ctx.fillStyle = "#4CAF50";
        this.food.forEach(f => ctx.fillRect(f.x * CELL_SIZE + 8, f.y * CELL_SIZE + 8, 8, 8));
        this.agents.forEach(a => {
            ctx.fillStyle = a.color;
            ctx.beginPath(); ctx.arc(a.x * CELL_SIZE + 12.5, a.y * CELL_SIZE + 12.5, 7, 0, 7); ctx.fill();
            if (a instanceof Collector && a.hasFood) {
                ctx.fillStyle = "#fff"; ctx.fillRect(a.x * CELL_SIZE + 10, a.y * CELL_SIZE + 10, 5, 5);
            }
        });
        document.getElementById('c-coll').innerText = this.agents.filter(a => a instanceof Collector).length;
        document.getElementById('c-build').innerText = this.agents.filter(a => a instanceof Builder).length;
        document.getElementById('c-pred').innerText = this.agents.filter(a => a instanceof Predator).length;
        document.getElementById('c-base').innerText = Math.floor(this.baseConstruction);
    }
};

function rand(m) { return Math.floor(Math.random() * m); }
function resetSim() { world.init(); running = false; world.draw(); }

document.getElementById('btnStart').onclick = () => running = true;
document.getElementById('btnStop').onclick = () => running = false;
document.getElementById('btnReset').onclick = resetSim;

world.init();
function loop() {
    if (running) world.update();
    world.draw();
    setTimeout(loop, 100);
}
loop();
</script>
</body>
</html>
