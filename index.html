<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Ecosystem Simulator</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { color: #4CAF50; margin: 0; font-size: 1.5rem; }

        .ui-panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* --- CODE VIEW STYLING --- */
        #code-view {
            width: 625px; /* Matches canvas width */
            height: 625px; /* Matches canvas height */
            background-color: #1e1e1e;
            color: #dcdcaa; /* A nice C++ syntax color */
            border: 2px solid #444;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            margin: 0;
        }

        /* --- CANVAS STYLING --- */
        #canvas-container { 
            position: relative; 
            display: none; /* Hidden on load */
        }

        canvas { 
            background-color: #000; 
            border: 2px solid #444;
            image-rendering: pixelated;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border: 2px solid #f44336;
        }

        #overlay h2 { color: #f44336; margin-bottom: 20px; letter-spacing: 2px; }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
            margin: 0 5px;
            text-transform: uppercase;
        }

        #btnStart { background: #4CAF50; color: white; }
        #btnStop { background: #f44336; color: white; }
        #btnReset { background: #2196F3; color: white; }
        .btn-retry { background: #ffffff; color: #000; }

        .stat-item { font-size: 0.9rem; font-weight: bold; }
        .green { color: #4CAF50; }
        .yellow { color: #FFEB3B; }
        .red { color: #f44336; }

        .legend { margin-top: 10px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Autonomous Ecosystem Simulator</h1>
    </div>

    <div class="ui-panel">
        <div class="controls">
            <button id="btnStart">Start</button>
            <button id="btnStop">Stop</button>
            <button id="btnReset">Reset</button>
        </div>
        <div class="stat-item green">Collectors: <span id="c-coll">0</span></div>
        <div class="stat-item yellow">Builders: <span id="c-build">0</span></div>
        <div class="stat-item red">Predators: <span id="c-pred">0</span></div>
        <div class="stat-item" style="color:#fff">Progress: <span id="c-base">0</span></div>
    </div>

    <pre id="code-view"></pre>

    <div id="canvas-container">
        <canvas id="ecoCanvas"></canvas>
        <div id="overlay">
            <h2>PREDATORS EXTINCT</h2>
            <button class="btn-retry" onclick="resetSim()">Restart Simulation</button>
        </div>
    </div>

    <div class="legend">
        Green = Collectors | Yellow = Builders | Red = Predators | Square = Food | White Box = Carrying Food
    </div>

<script type="text/plain" id="cpp-source">
#include <iostream>
#include <vector>
#include <memory>
#include <cstdlib>
#include <ctime>
#include <cmath>
#include <algorithm>

using namespace std;

const int GRID_SIZE = 25;
const int BASE_X = 12;
const int BASE_Y = 12;

class Environment;

// 1. BASE ENTITY CLASS
class Agent : public enable_shared_from_this<Agent> {
protected:
    int x, y;
    double energy;
    double maxEnergy;
    char symbol;
    bool alive;

public:
    Agent(int startX, int startY, double en, char sym) 
        : x(startX), y(startY), energy(en), maxEnergy(en), symbol(sym), alive(true) {}
    
    virtual ~Agent() = default;

    int getX() const { return x; }
    int getY() const { return y; }
    bool isAlive() const { return alive && energy > 0; }
    void kill() { alive = false; }
    
    void moveRandom() {
        x = max(0, min(GRID_SIZE - 1, x + (rand() % 3) - 1));
        y = max(0, min(GRID_SIZE - 1, y + (rand() % 3) - 1));
    }

    virtual void update(Environment& env) = 0;
};

// 2. RESOURCE STRUCT
struct Resource { int x, y; };

// 3. ENVIRONMENT CLASS
class Environment {
public:
    vector<shared_ptr<Agent>> agents;
    vector<Resource> food;
    int baseResources = 0;
    double baseConstruction = 0;

    void addAgent(shared_ptr<Agent> agent) { agents.push_back(agent); }

    void spawnFood() {
        if (rand() % 100 < 50) food.push_back({rand() % GRID_SIZE, rand() % GRID_SIZE});
    }

    bool update() {
        spawnFood();
        for (auto& a : agents) if (a->isAlive()) a->update(*this);

        agents.erase(remove_if(agents.begin(), agents.end(), 
            [](const shared_ptr<Agent>& a) { return !a->isAlive(); }), agents.end());

        int pCount = count_if(agents.begin(), agents.end(), [](const shared_ptr<Agent>& a){ return a->getSymbol() == 'P'; });
        return pCount > 0;
    }
};

// 4. DERIVED AGENTS
class Collector : public Agent {
    bool hasFood = false;
public:
    Collector(int x, int y) : Agent(x, y, 100.0, 'C') {}
    void update(Environment& env) override {
        // Gathering Logic here...
    }
};

class Builder : public Agent {
public:
    Builder(int x, int y) : Agent(x, y, 100.0, 'B') {}
    void update(Environment& env) override {
        // Building Logic here...
    }
};

class Predator : public Agent {
public:
    Predator(int x, int y) : Agent(x, y, 100.0, 'P') {}
    void update(Environment& env) override {
        // Hunting Logic here...
    }
};

int main() {
    srand(static_cast<unsigned>(time(0)));
    Environment env;
    // Initialization and main loop handled by web engine natively...
    return 0;
}
</script>

<script>
// 1. Fetch the C++ Code from the hidden script tag and display it
document.getElementById('code-view').textContent = document.getElementById('cpp-source').textContent.trim();

// 2. Simulation Configuration
const GRID_SIZE = 25;
const CELL_SIZE = 25; 
const canvas = document.getElementById('ecoCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

canvas.width = GRID_SIZE * CELL_SIZE;
canvas.height = GRID_SIZE * CELL_SIZE;

let running = false;
let hasStartedOnce = false; // Tracks if we've switched from code view to canvas
const BASE_POS = { x: 12, y: 12 };

// --- JS ENTITIES (Mirroring the C++ Logic) ---
class Agent {
    constructor(x, y, energy, color) {
        this.x = x; this.y = y;
        this.energy = energy; this.maxEnergy = energy;
        this.color = color; this.alive = true;
    }
    moveRandom() {
        this.x = Math.max(0, Math.min(GRID_SIZE - 1, this.x + (Math.floor(Math.random() * 3) - 1)));
        this.y = Math.max(0, Math.min(GRID_SIZE - 1, this.y + (Math.floor(Math.random() * 3) - 1)));
    }
}

class Collector extends Agent {
    constructor(x, y) { super(x, y, 100, "#4CAF50"); this.hasFood = false; }
    update(env) {
        if (!this.hasFood) {
            const fIdx = env.food.findIndex(f => f.x === this.x && f.y === this.y);
            if (fIdx !== -1) { this.hasFood = true; env.food.splice(fIdx, 1); }
            this.moveRandom();
        } else {
            if (this.x < BASE_POS.x) this.x++; else if (this.x > BASE_POS.x) this.x--;
            if (this.y < BASE_POS.y) this.y++; else if (this.y > BASE_POS.y) this.y--;
            if (this.x === BASE_POS.x && this.y === BASE_POS.y) {
                this.hasFood = false;
                env.baseResources += 40;
                this.energy = this.maxEnergy;
            }
        }
        this.energy -= 0.3;
        if (this.energy <= 0) this.alive = false;
    }
}

class Builder extends Agent {
    constructor(x, y) { super(x, y, 100, "#FFEB3B"); }
    update(env) {
        const dist = Math.abs(this.x - BASE_POS.x) + Math.abs(this.y - BASE_POS.y);
        if (dist > 3) {
            if (this.x < BASE_POS.x) this.x++; else if (this.x > BASE_POS.x) this.x--;
            if (this.y < BASE_POS.y) this.y++; else if (this.y > BASE_POS.y) this.y--;
        } else {
            this.moveRandom();
            if (env.baseResources > 0) {
                env.baseResources -= 1; 
                env.baseConstruction += 0.15;
                this.energy = Math.min(this.maxEnergy, this.energy + 1);
            }
        }
        this.energy -= 0.2;
        if (this.energy <= 0) this.alive = false;
    }
}

class Predator extends Agent {
    constructor(x, y) { super(x, y, 100, "#f44336"); }
    update(env) {
        const prey = env.agents.find(a => (a instanceof Collector || a instanceof Builder) && a.x === this.x && a.y === this.y && a.alive);
        if (prey) { prey.alive = false; this.energy = this.maxEnergy + 20; }

        let target = null;
        let minDist = 7;
        env.agents.forEach(a => {
            if ((a instanceof Collector || a instanceof Builder) && a.alive) {
                let d = Math.abs(this.x - a.x) + Math.abs(this.y - a.y);
                if (d < minDist) { minDist = d; target = a; }
            }
        });

        if (target) {
            if (this.x < target.x) this.x++; else if (this.x > target.x) this.x--;
            if (this.y < target.y) this.y++; else if (this.y > target.y) this.y--;
        } else {
            this.moveRandom();
        }

        this.energy -= 1.2; 
        if (this.energy <= 0) this.alive = false;
    }
}

const world = {
    agents: [], food: [], baseResources: 0, baseConstruction: 0,
    init() {
        this.agents = []; this.food = []; this.baseResources = 0; this.baseConstruction = 0;
        for(let i=0; i<15; i++) this.agents.push(new Collector(rand(GRID_SIZE), rand(GRID_SIZE)));
        for(let i=0; i<8; i++) this.agents.push(new Builder(BASE_POS.x, BASE_POS.y));
        for(let i=0; i<6; i++) this.agents.push(new Predator(rand(GRID_SIZE), rand(GRID_SIZE)));
        overlay.style.display = 'none';
    },
    update() {
        if (Math.random() < 0.5) this.food.push({x: rand(GRID_SIZE), y: rand(GRID_SIZE)});
        this.agents.forEach(a => { if (a.alive) a.update(this); });
        this.agents = this.agents.filter(a => a.alive);

        if (this.agents.filter(a => a instanceof Predator).length === 0) {
            running = false;
            overlay.style.display = 'flex';
        }
    },
    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#1a1a1a";
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE); ctx.stroke();
        }
        const bSize = 15 + Math.floor(this.baseConstruction / 5);
        ctx.fillStyle = "#333";
        ctx.fillRect(BASE_POS.x * CELL_SIZE - bSize/4, BASE_POS.y * CELL_SIZE - bSize/4, bSize, bSize);
        ctx.fillStyle = "#4CAF50";
        this.food.forEach(f => ctx.fillRect(f.x * CELL_SIZE + 8, f.y * CELL_SIZE + 8, 9, 9));
        this.agents.forEach(a => {
            ctx.fillStyle = a.color;
            ctx.beginPath(); ctx.arc(a.x * CELL_SIZE + 12.5, a.y * CELL_SIZE + 12.5, 7, 0, 7); ctx.fill();
            if (a instanceof Collector && a.hasFood) {
                ctx.fillStyle = "#fff"; ctx.fillRect(a.x * CELL_SIZE + 10, a.y * CELL_SIZE + 10, 5, 5);
            }
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(a.x * CELL_SIZE + 5, a.y * CELL_SIZE + 2, 15, 2);
            ctx.fillStyle = a.color;
            ctx.fillRect(a.x * CELL_SIZE + 5, a.y * CELL_SIZE + 2, (Math.max(0, a.energy) / a.maxEnergy) * 15, 2);
        });
        document.getElementById('c-coll').innerText = this.agents.filter(a => a instanceof Collector).length;
        document.getElementById('c-build').innerText = this.agents.filter(a => a instanceof Builder).length;
        document.getElementById('c-pred').innerText = this.agents.filter(a => a instanceof Predator).length;
        document.getElementById('c-base').innerText = Math.floor(this.baseConstruction);
    }
};

function rand(m) { return Math.floor(Math.random() * m); }

function resetSim() { 
    world.init(); 
    running = false; 
    if (hasStartedOnce) world.draw(); 
}

// --- BUTTON CONTROLS ---
document.getElementById('btnStart').onclick = () => { 
    if (!hasStartedOnce) {
        document.getElementById('code-view').style.display = 'none';
        document.getElementById('canvas-container').style.display = 'block';
        hasStartedOnce = true;
    }
    running = true; 
    overlay.style.display = 'none'; 
};

document.getElementById('btnStop').onclick = () => running = false;
document.getElementById('btnReset').onclick = resetSim;

world.init();
function loop() {
    if (running) world.update();
    if (hasStartedOnce) world.draw();
    setTimeout(loop, 110);
}
loop();
</script>
</body>
</html>
