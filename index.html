<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Ecosystem Simulator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 { margin-bottom: 10px; color: #4CAF50; }

        #sim-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas { background-color: #222; display: block; }

        .stats {
            margin-top: 15px;
            padding: 10px 20px;
            background: #333;
            border-radius: 8px;
            display: flex;
            gap: 20px;
        }

        .legend {
            margin-top: 10px;
            font-size: 0.9em;
            color: #aaa;
        }

        b { color: #fff; }
    </style>
</head>
<body>

    <h1>Ecosystem Simulator</h1>
    
    <div id="sim-container">
        <canvas id="ecosystemCanvas"></canvas>
    </div>

    <div class="stats">
        <div>Gatherers: <span id="count-g" style="color: #4CAF50; font-weight: bold;">0</span></div>
        <div>Predators: <span id="count-p" style="color: #F44336; font-weight: bold;">0</span></div>
        <div>Resources: <span id="count-r" style="color: #FFEB3B; font-weight: bold;">0</span></div>
    </div>

    <div class="legend">
        <b>Green Dot</b>: Gatherer | <b>Red Dot</b>: Predator | <b>Yellow Star</b>: Food
    </div>

<script>
/**
 * REPLICATING THE C++ LOGIC IN JAVASCRIPT
 */

const GRID_SIZE = 20; // 20x20 grid
const CELL_SIZE = 30; // pixels per cell
const canvas = document.getElementById('ecosystemCanvas');
const ctx = canvas.getContext('2d');

canvas.width = GRID_SIZE * CELL_SIZE;
canvas.height = GRID_SIZE * CELL_SIZE;

// --- 1. BASE ENTITY ---
class Entity {
    constructor(x, y, symbol) {
        this.x = x;
        this.y = y;
        this.symbol = symbol;
    }
}

// --- 2. RESOURCE ---
class Resource extends Entity {
    constructor(x, y) {
        super(x, y, '*');
        this.nutritionalValue = 20;
    }
}

// --- 3. ABSTRACT AGENT ---
class Agent extends Entity {
    constructor(x, y, symbol, hp, en) {
        super(x, y, symbol);
        this.health = hp;
        this.energy = en;
        this.alive = true;
    }

    isAlive() {
        return this.alive && this.energy > 0;
    }

    drainEnergy(amount = 1) {
        this.energy -= amount;
        if (this.energy <= 0) this.alive = false;
    }

    // "act" is meant to be overridden (Polymorphism)
    act(env) {}
}

// --- 4. GATHERER ---
class GathererAgent extends Agent {
    constructor(x, y) {
        super(x, y, 'G', 50, 60);
    }

    act(env) {
        // Check for food
        const res = env.getResourceAt(this.x, this.y);
        if (res) {
            this.energy += res.nutritionalValue;
            env.removeResource(res);
            return;
        }

        // Random Move
        this.x = Math.max(0, Math.min(GRID_SIZE - 1, this.x + (Math.floor(Math.random() * 3) - 1)));
        this.y = Math.max(0, Math.min(GRID_SIZE - 1, this.y + (Math.floor(Math.random() * 3) - 1)));
    }
}

// --- 5. PREDATOR ---
class PredatorAgent extends Agent {
    constructor(x, y) {
        super(x, y, 'P', 100, 80);
    }

    act(env) {
        // Check for Gatherers to eat
        const prey = env.agents.find(a => a instanceof GathererAgent && a.x === this.x && a.y === this.y && a.isAlive());
        if (prey) {
            prey.alive = false;
            this.energy += 50;
            return;
        }

        // Move twice as fast (random but two steps)
        for(let i=0; i<2; i++) {
            this.x = Math.max(0, Math.min(GRID_SIZE - 1, this.x + (Math.floor(Math.random() * 3) - 1)));
            this.y = Math.max(0, Math.min(GRID_SIZE - 1, this.y + (Math.floor(Math.random() * 3) - 1)));
        }
    }
}

// --- 6. ENVIRONMENT ---
class Environment {
    constructor() {
        this.agents = [];
        this.resources = [];
    }

    addAgent(agent) { this.agents.push(agent); }

    spawnResource() {
        if (Math.random() < 0.2) { // 20% chance per frame
            const rx = Math.floor(Math.random() * GRID_SIZE);
            const ry = Math.floor(Math.random() * GRID_SIZE);
            if (!this.getResourceAt(rx, ry)) {
                this.resources.push(new Resource(rx, ry));
            }
        }
    }

    getResourceAt(x, y) {
        return this.resources.find(r => r.x === x && r.y === y);
    }

    removeResource(res) {
        this.resources = this.resources.filter(r => r !== res);
    }

    update() {
        this.spawnResource();

        this.agents.forEach(agent => {
            if (agent.isAlive()) {
                agent.act(this);
                agent.drainEnergy(0.2); // Slower drain for visual balance
            }
        });

        // Cleanup dead
        this.agents = this.agents.filter(a => a.isAlive());
    }

    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Grid Lines
        ctx.strokeStyle = "#333";
        for(let i=0; i<=GRID_SIZE; i++) {
            ctx.beginPath(); ctx.moveTo(i*CELL_SIZE, 0); ctx.lineTo(i*CELL_SIZE, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*CELL_SIZE); ctx.lineTo(canvas.width, i*CELL_SIZE); ctx.stroke();
        }

        // Draw Resources
        this.resources.forEach(r => {
            ctx.fillStyle = "#FFEB3B";
            ctx.beginPath();
            ctx.arc(r.x * CELL_SIZE + CELL_SIZE/2, r.y * CELL_SIZE + CELL_SIZE/2, 5, 0, Math.PI*2);
            ctx.fill();
        });

        // Draw Agents
        this.agents.forEach(a => {
            ctx.fillStyle = (a instanceof GathererAgent) ? "#4CAF50" : "#F44336";
            ctx.beginPath();
            ctx.arc(a.x * CELL_SIZE + CELL_SIZE/2, a.y * CELL_SIZE + CELL_SIZE/2, 8, 0, Math.PI*2);
            ctx.fill();
            // Energy bar (mini)
            ctx.fillStyle = "white";
            ctx.fillRect(a.x * CELL_SIZE + 5, a.y * CELL_SIZE + 2, (a.energy/100)*20, 2);
        });

        // Update UI counters
        document.getElementById('count-g').innerText = this.agents.filter(a => a instanceof GathererAgent).length;
        document.getElementById('count-p').innerText = this.agents.filter(a => a instanceof PredatorAgent).length;
        document.getElementById('count-r').innerText = this.resources.length;
    }
}

// --- INITIALIZATION ---
const env = new Environment();

// Initial Population
for (let i = 0; i < 15; i++) env.addAgent(new GathererAgent(Math.floor(Math.random()*GRID_SIZE), Math.floor(Math.random()*GRID_SIZE)));
for (let i = 0; i < 4; i++) env.addAgent(new PredatorAgent(Math.floor(Math.random()*GRID_SIZE), Math.floor(Math.random()*GRID_SIZE)));

// Simulation Loop
let lastTime = 0;
function loop(timestamp) {
    if (timestamp - lastTime > 150) { // Slow down simulation to ~6 frames per second
        env.update();
        env.draw();
        lastTime = timestamp;
    }
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
